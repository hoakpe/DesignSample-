<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cart — Savora</title>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
.checkout-info-form { margin-bottom: 24px; display: flex; flex-direction: column; gap: 14px; }
.checkout-info-form input, .checkout-info-form textarea {
  background: #222; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
  padding: 11px 14px; color: #f0f0f0; font-family: 'DM Sans',sans-serif; font-size: 0.9rem; outline: none;
}
.checkout-info-form input:focus, .checkout-info-form textarea:focus { border-color: #f5a623; }
.checkout-info-form label { font-size: 0.78rem; color: #999; font-weight: 600; display: block; margin-bottom: 4px; }
.checkout-info-form textarea { resize: vertical; min-height: 70px; }
.order-note { font-size: 0.78rem; color: #999; text-align: center; margin-top: 10px; line-height: 1.5; }
.wa-select-wrap { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
.wa-choice-label { font-size: 0.8rem; color: #999; font-weight: 600; text-align: center; }
.checkout-btn i { font-size: 1.1rem; }
</style>
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo-wrap"><img src="logo.png" alt="Savora Logo" class="nav-logo"/></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cart.html" class="cart-icon-wrap active"><i class="fas fa-shopping-bag"></i><span class="cart-badge" id="cartBadge">0</span></a></li>
    </ul>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>

<section class="cart-section">
  <div class="container">
    <div class="page-hero" style="padding:0 0 40px;background:none;text-align:left;">
      <p class="breadcrumb"><a href="index.html">Home</a> / <a href="menu.html">Menu</a> / Cart</p>
      <h1>Your <span class="gold">Cart</span></h1>
    </div>

    <div class="cart-layout" id="cartLayout">
      <!-- Cart Items -->
      <div class="cart-items-wrap">
        <h2>Order Items</h2>
        <div id="cartItemsContainer"></div>
      </div>

      <!-- Order Summary -->
      <div class="order-summary" id="orderSummaryBox">
        <h3>Order Summary</h3>
        <div id="summaryRows"></div>
        <div class="summary-total" id="summaryTotal"></div>

        <!-- Customer Info -->
        <div class="checkout-info-form">
          <div>
            <label>Your Name *</label>
            <input type="text" id="custName" placeholder="e.g. Ama Mensah"/>
          </div>
          <div>
            <label>Delivery Address *</label>
            <input type="text" id="custAddress" placeholder="Street, Area, City"/>
          </div>
          <div>
            <label>Phone Number</label>
            <input type="tel" id="custPhone" placeholder="+233 ..."/>
          </div>
          <div>
            <label>Special Instructions</label>
            <textarea id="custNotes" placeholder="e.g. extra spicy, no onions..."></textarea>
          </div>
        </div>

        <!-- Checkout Options -->
        <div class="checkout-methods" id="checkoutMethods"></div>
        <p class="order-note">Delivery fee: ₵15.00 · Orders confirmed within 5 mins · Mon–Sun 8am–10pm</p>
      </div>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container footer-inner">
    <div class="footer-brand">
      <img src="logo.png" alt="Savora" class="footer-logo"/>
      <p>Food, Your Way. Delivered.</p>
      <div class="social-links">
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-tiktok"></i></a>
      </div>
    </div>
    <div class="footer-col">
      <h4>Quick Links</h4>
      <ul><li><a href="index.html">Home</a></li><li><a href="menu.html">Menu</a></li><li><a href="contact.html">Contact</a></li></ul>
    </div>
  </div>
  <div class="footer-bottom"><p>© 2025 Savora. All rights reserved.</p></div>
</footer>

<script src="app.js"></script>
<script>
function renderCart() {
  const cart = getCart();
  const container = document.getElementById("cartItemsContainer");
  const summaryRows = document.getElementById("summaryRows");
  const summaryTotal = document.getElementById("summaryTotal");
  const methods = document.getElementById("checkoutMethods");
  const layout = document.getElementById("cartLayout");

  if (!cart.length) {
    container.innerHTML = `
      <div class="empty-cart">
        <i class="fas fa-shopping-bag"></i>
        <p>Your cart is empty.</p>
        <a href="menu.html" class="btn-primary" style="margin-top:20px;display:inline-flex;">Browse Menu <i class="fas fa-arrow-right"></i></a>
      </div>`;
    document.getElementById("orderSummaryBox").style.display = "none";
    return;
  }

  document.getElementById("orderSummaryBox").style.display = "block";

  // Render items
  container.innerHTML = cart.map(item => `
    <div class="cart-item">
      <img src="${item.img}" alt="${item.name}" class="cart-item-img"/>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">₵${item.price.toFixed(2)} each</div>
      </div>
      <div class="cart-qty">
        <button class="qty-btn" onclick="changeQty(${item.id}, -1)"><i class="fas fa-minus"></i></button>
        <span class="qty-val">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id}, 1)"><i class="fas fa-plus"></i></button>
      </div>
      <span style="font-weight:700;color:#f5a623;min-width:68px;text-align:right;">₵${(item.price*item.qty).toFixed(2)}</span>
      <button class="remove-btn" onclick="removeItem(${item.id})"><i class="fas fa-times"></i></button>
    </div>`).join("");

  const subtotal = cart.reduce((s,i) => s + i.price * i.qty, 0);
  const delivery = 15;
  const total = subtotal + delivery;

  summaryRows.innerHTML = `
    <div class="summary-row"><span>Subtotal</span><span>₵${subtotal.toFixed(2)}</span></div>
    <div class="summary-row"><span>Delivery Fee</span><span>₵${delivery.toFixed(2)}</span></div>`;

  summaryTotal.innerHTML = `<span>Total</span><span>₵${total.toFixed(2)}</span>`;

  methods.innerHTML = `
    <p class="wa-choice-label"><i class="fab fa-whatsapp" style="color:#25D366"></i> Order via WhatsApp</p>
    <div class="wa-select-wrap">
      <button class="checkout-btn wa" onclick="orderWhatsApp('${WHATSAPP_NUMBER_1}')">
        <i class="fab fa-whatsapp"></i> WhatsApp Number 1
      </button>
      <button class="checkout-btn wa" style="background:#1da851" onclick="orderWhatsApp('${WHATSAPP_NUMBER_2}')">
        <i class="fab fa-whatsapp"></i> WhatsApp Number 2
      </button>
    </div>
    <div class="checkout-divider">or</div>
    <button class="checkout-btn form" onclick="window.location.href='contact.html#order-form'">
      <i class="fas fa-clipboard-list"></i> Fill Order Form
    </button>
    <div class="checkout-divider">or</div>
    <button class="checkout-btn email" onclick="orderEmail()">
      <i class="fas fa-envelope"></i> Send via Email
    </button>`;
}

function changeQty(id, delta) {
  const cart = getCart();
  const item = cart.find(c => c.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) { removeItem(id); return; }
  saveCart(cart);
  renderCart();
}

function removeItem(id) {
  const cart = getCart().filter(c => c.id !== id);
  saveCart(cart);
  renderCart();
  showToast('<i class="fas fa-trash"></i> Item removed from cart.');
}

function getInfo() {
  return {
    name: document.getElementById("custName").value.trim(),
    address: document.getElementById("custAddress").value.trim(),
    phone: document.getElementById("custPhone").value.trim(),
    notes: document.getElementById("custNotes").value.trim(),
  };
}

function orderWhatsApp(number) {
  const { name, address, phone, notes } = getInfo();
  if (!name || !address) { showToast('<i class="fas fa-exclamation-circle"></i> Please enter your name and address.'); return; }
  const cart = getCart();
  if (!cart.length) return;
  const msg = buildWhatsAppMessage(cart, name + (phone ? ` (${phone})` : ""), address, notes);
  window.open(`https://wa.me/${number.replace(/\D/g,"")}?text=${msg}`, "_blank");
}

function orderEmail() {
  const { name, address, phone, notes } = getInfo();
  if (!name || !address) { showToast('<i class="fas fa-exclamation-circle"></i> Please enter your name and address.'); return; }
  const cart = getCart();
  const itemList = cart.map(i => `${i.name} x${i.qty} = GHS ${(i.price*i.qty).toFixed(2)}`).join("\n");
  const subtotal = cart.reduce((s,i) => s + i.price*i.qty, 0);
  const total = subtotal + 15;
  const subject = encodeURIComponent("New Order — Savora");
  const body = encodeURIComponent(
    `NEW ORDER FROM SAVORA WEBSITE\n\nCustomer: ${name}\nPhone: ${phone||"N/A"}\nAddress: ${address}\n\nORDER:\n${itemList}\n\nSubtotal: GHS ${subtotal.toFixed(2)}\nDelivery: GHS 15.00\nTOTAL: GHS ${total.toFixed(2)}\n\nNotes: ${notes||"None"}`
  );
  window.open(`mailto:${ORDER_EMAIL}?subject=${subject}&body=${body}`, "_blank");
}

renderCart();
updateCartBadge();
</script>
</body>
</html>
